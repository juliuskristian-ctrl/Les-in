<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - LES-IN</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4 card shadow p-4 border-0" style="border-radius: 15px;">
            <h3 class="text-center fw-bold text-primary mb-4">MASUK KE LES-IN</h3>

            <div th:if="${param.registered}" class="alert alert-success small">Pendaftaran berhasil! Silakan login.</div>
            <div th:if="${error}" class="alert alert-danger small" th:text="${error}"></div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Login</button>
            </form>
            <p class="text-center mt-3 small">Belum punya akun? <a href="/register">Daftar di sini</a></p>
        </div>
    </div>
</div>
</body>
</html>
