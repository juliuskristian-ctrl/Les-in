<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Daftar LES-IN</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light py-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 card shadow p-4 border-0" style="border-radius: 15px;">
            <h2 class="text-center fw-bold text-primary mb-4">Buat Akun</h2>
            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="mb-3">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" th:field="*{nama}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" th:field="*{email}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" th:field="*{password}" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Nomor WhatsApp</label>
                    <input type="text" th:field="*{noWhatsapp}" class="form-control" placeholder="62812..." required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Daftar Sebagai</label>
                    <select th:field="*{role}" class="form-select" id="roleSelect" onchange="toggleFields()">
                        <option value="MURID">Murid</option>
                        <option value="GURU">Guru</option>
                    </select>
                </div>
                <div id="extraFields" style="display:none;" class="bg-light p-3 rounded mb-3">
                    <div class="mb-2">
                        <label>Mata Pelajaran</label>
                        <input type="text" th:field="*{mataPelajaran}" class="form-control">
                    </div>
                    <div>
                        <label>Bio Singkat</label>
                        <textarea th:field="*{bio}" class="form-control"></textarea>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Daftar</button>
            </form>
        </div>
    </div>
</div>
<script>
    function toggleFields() {
        const role = document.getElementById('roleSelect').value;
        document.getElementById('extraFields').style.display = (role === 'GURU') ? 'block' : 'none';
    }
</script>
</body>
</html>
