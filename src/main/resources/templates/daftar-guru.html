<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cari Guru - LES-IN</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .card-guru { border-radius: 15px; border: none; transition: 0.3s; overflow: hidden; }
        .card-guru:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1)!important; }
        .img-guru-card { height: 200px; object-fit: cover; width: 100%; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/guru">LES-IN</a>
        <div class="d-flex align-items-center gap-3">
            <span class="text-white small" th:text="${user != null ? 'Halo, ' + user.nama : 'Halo'}">User</span>
            <a href="/logout" class="btn btn-danger btn-sm fw-bold">Logout</a>
        </div>
    </div>
</nav>

<div class="container">
    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show">
        ✅ Pesanan berhasil dikirim!
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${param.errorDuplikat}" class="alert alert-danger alert-dismissible fade show">
        ⚠️ Anda sudah memiliki pesanan aktif untuk guru ini.
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <h3 class="fw-bold mb-4">Pilih Guru Terbaikmu</h3>
    <div class="row">
        <div class="col-md-4 mb-4" th:each="guru : ${daftarGuru}">
            <div class="card h-100 shadow-sm card-guru">
                <img th:src="${guru.fotoUrl}" class="img-guru-card" alt="Foto Guru">
                <div class="card-body p-4">
                    <h5 class="fw-bold text-primary" th:text="${guru.nama}">Nama Guru</h5>
                    <span class="badge bg-info text-dark mb-3" th:text="${guru.mataPelajaran}">Mapel</span>
                    <p class="text-secondary small" th:text="${guru.bio}">Bio...</p>
                    <form th:action="@{'/pesan-guru/' + ${guru.id}}" method="post">
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Pesan Les</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-5 pt-4 border-top">
        <h4 class="fw-bold mb-4">📅 Status Pesanan Saya</h4>
        <div class="card border-0 shadow-sm p-3" style="border-radius: 15px;">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr><th>Guru</th><th>Mapel</th><th>Status</th><th>Aksi</th></tr>
                </thead>
                <tbody>
                <tr th:each="p : ${pesananSaya}">
                    <td th:text="${p.namaGuru}" class="fw-bold text-primary">Guru</td>
                    <td th:text="${p.mataPelajaran}">Mapel</td>
                    <td>
                        <span th:text="${p.status}"
                              th:classappend="${p.status == 'DISETUJUI' ? 'bg-success' : (p.status == 'DITOLAK' ? 'bg-danger' : 'bg-warning text-dark')}"
                              class="badge">STATUS</span>
                    </td>
                    <td>
                        <a th:if="${p.status == 'DISETUJUI'}"
                           th:href="'https://wa.me/' + ${p.noWhatsappGuru}"
                           target="_blank" class="btn btn-success btn-sm fw-bold shadow-sm">
                            💬 Chat WA
                        </a>
                        <span th:if="${p.status == 'MENUNGGU'}" class="text-muted small">Menunggu...</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(pesananSaya)}">
                    <td colspan="4" class="text-center text-muted py-4">Belum ada pesanan.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
